name: tfdocs

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      pr-ref:
        required: true
        type: string

jobs:
  tfdocs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.pr-ref }}

      - name: Render terraform docs inside the README.md and push changes back to PR branch
        id: tfdocs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c
        with:
          find-dir: ${{ inputs.working-directory }}
          config-file: ${{ inputs.working-directory }}/.terraform-docs/terraform-docs.yml
          git-push: "true"
